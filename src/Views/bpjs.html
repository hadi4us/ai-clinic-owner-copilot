<!doctype html>
<html lang="id"><head><base target="_top"><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>BPJS Dashboard</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head>
<body class="bg-blue-950 text-white"><main class="mx-auto max-w-6xl p-4"><div class="mb-5 flex items-center justify-between"><div><p class="text-sm font-bold uppercase tracking-widest text-cyan-300">Executive Dashboard</p><h1 class="text-3xl font-black">BPJS Receivable</h1><p id="subtitle" class="text-sm text-blue-200">Loading...</p></div><a class="rounded-full bg-white px-4 py-2 text-sm font-bold text-blue-950" href="?view=dashboard">Overview</a></div><section class="grid gap-4 md:grid-cols-4"><div class="rounded-3xl bg-white/10 p-5 ring-1 ring-white/10"><p class="text-sm font-bold text-blue-200">Submitted</p><p id="submitted" class="mt-2 text-3xl font-black">-</p></div><div class="rounded-3xl bg-white/10 p-5 ring-1 ring-white/10"><p class="text-sm font-bold text-blue-200">Approved</p><p id="approved" class="mt-2 text-3xl font-black">-</p></div><div class="rounded-3xl bg-cyan-300 p-5 text-blue-950"><p class="text-sm font-black uppercase opacity-70">Outstanding</p><p id="outstanding" class="mt-2 text-3xl font-black">-</p></div><div class="rounded-3xl bg-white/10 p-5 ring-1 ring-white/10"><p class="text-sm font-bold text-blue-200">Rejected</p><p id="rejected" class="mt-2 text-3xl font-black">-</p></div></section><section class="mt-5 rounded-3xl bg-white/10 p-5 ring-1 ring-white/10"><h2 class="text-xl font-black">Claim Composition</h2><canvas id="chart" height="110"></canvas></section><section class="mt-5 rounded-3xl bg-white/10 p-5 text-sm text-blue-100 ring-1 ring-white/10" id="note"></section></main><script>function r(v){const n=Number(v||0),a=Math.abs(n),s=n<0?'-':'';return s+'Rp'+a.toLocaleString('id-ID')}function t(i,v){document.getElementById(i).textContent=v}google.script.run.withSuccessHandler(function(x){const b=x.bpjs;t('subtitle',x.clinicId+' • '+x.period+' • '+x.generatedAt);t('submitted',r(b.submittedAmount));t('approved',r(b.approvedAmount));t('outstanding',r(b.outstandingAmount));t('rejected',String(b.rejectedCount||0));document.getElementById('note').textContent='BPJS Receivable bersifat aggregate management view, tanpa diagnosis atau data medis pasien. Data status: '+b.dataStatus;new Chart(document.getElementById('chart'),{type:'doughnut',data:{labels:['Paid','Outstanding'],datasets:[{data:[b.paidAmount,b.outstandingAmount],backgroundColor:['#22c55e','#67e8f9']}]},options:{plugins:{legend:{position:'bottom',labels:{color:'#dbeafe'}}}}})}).getDefaultExecutiveDashboardPayload();</script></body></html>
