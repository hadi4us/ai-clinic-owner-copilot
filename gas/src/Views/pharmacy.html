<!doctype html>
<html lang="id"><head><base target="_top"><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Pharmacy Dashboard</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head>
<body class="bg-emerald-950 text-white"><main class="mx-auto max-w-6xl p-4"><div class="mb-5 flex items-center justify-between"><div><p class="text-sm font-bold uppercase tracking-widest text-emerald-300">Executive Dashboard</p><h1 class="text-3xl font-black">Pharmacy & Inventory Risk</h1><p id="subtitle" class="text-sm text-emerald-200">Loading...</p></div><a class="rounded-full bg-white px-4 py-2 text-sm font-bold text-emerald-950" href="?view=dashboard">Overview</a></div><section class="grid gap-4 md:grid-cols-4"><div class="rounded-3xl bg-emerald-300 p-5 text-emerald-950"><p class="text-sm font-black uppercase opacity-70">Inventory Risk</p><p id="risk" class="mt-2 text-4xl font-black">-</p></div><div class="rounded-3xl bg-white/10 p-5 ring-1 ring-white/10"><p class="text-sm font-bold text-emerald-200">Medicine Revenue</p><p id="revenue" class="mt-2 text-3xl font-black">-</p></div><div class="rounded-3xl bg-white/10 p-5 ring-1 ring-white/10"><p class="text-sm font-bold text-emerald-200">Medicine Margin</p><p id="margin" class="mt-2 text-3xl font-black">-</p></div><div class="rounded-3xl bg-white/10 p-5 ring-1 ring-white/10"><p class="text-sm font-bold text-emerald-200">No Movement</p><p id="noMovement" class="mt-2 text-3xl font-black">-</p></div></section><section class="mt-5 rounded-3xl bg-white/10 p-5 ring-1 ring-white/10"><h2 class="text-xl font-black">Risk Composition</h2><canvas id="chart" height="110"></canvas></section><section class="mt-5 rounded-3xl bg-white/10 p-5 text-sm text-emerald-100 ring-1 ring-white/10" id="note"></section></main><script>function r(v){const n=Number(v||0),a=Math.abs(n),s=n<0?'-':'';if(a>=1e9)return s+'Rp'+(a/1e9).toFixed(1).replace('.0','')+' M';if(a>=1e6)return s+'Rp'+(a/1e6).toFixed(1).replace('.0','')+' jt';return s+'Rp'+a.toLocaleString('id-ID')}function p(v){return v==null?'-':(Number(v)*100).toFixed(1).replace('.0','')+'%'}function t(i,v){document.getElementById(i).textContent=v}google.script.run.withSuccessHandler(function(x){const m=x.pharmacy;t('subtitle',x.clinicId+' • '+x.period+' • '+x.generatedAt);t('risk',String(m.riskScore||0)+'/100');t('revenue',r(m.medicineRevenue));t('margin',p(m.medicineMargin));t('noMovement',String(m.noMovementCount||0));document.getElementById('note').textContent='Inventory Risk adalah sinyal operasional, bukan rekomendasi klinis/obat. Data status: '+m.dataStatus+' • Risk level: '+m.riskLevel;new Chart(document.getElementById('chart'),{type:'bar',data:{labels:['Risk','Healthy'],datasets:[{label:'Score',data:[m.riskScore,Math.max(0,100-(m.riskScore||0))],backgroundColor:['#f59e0b','#34d399']}]},options:{indexAxis:'y',plugins:{legend:{display:false}},scales:{x:{max:100,ticks:{color:'#d1fae5'}},y:{ticks:{color:'#d1fae5'}}}}})}).getDefaultExecutiveDashboardPayload();</script></body></html>
