<!doctype html>
<html lang="id"><head><base target="_top"><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Finance Dashboard</title><script src="https://cdn.tailwindcss.com"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head>
<body class="bg-slate-50 text-slate-900"><main class="mx-auto max-w-6xl p-4"><div class="mb-5 flex items-center justify-between"><div><p class="text-sm font-bold uppercase tracking-widest text-blue-600">Executive Dashboard</p><h1 class="text-3xl font-black">Finance</h1><p id="subtitle" class="text-sm text-slate-500">Loading...</p></div><a class="rounded-full bg-slate-900 px-4 py-2 text-sm font-bold text-white" href="?view=dashboard">Overview</a></div><section class="grid gap-4 md:grid-cols-4"><div class="rounded-3xl bg-white p-5 shadow"><p class="text-sm font-bold text-slate-500">Revenue</p><p id="revenue" class="mt-2 text-3xl font-black">-</p></div><div class="rounded-3xl bg-white p-5 shadow"><p class="text-sm font-bold text-slate-500">Gross Profit</p><p id="gross" class="mt-2 text-3xl font-black">-</p></div><div class="rounded-3xl bg-white p-5 shadow"><p class="text-sm font-bold text-slate-500">Net Profit</p><p id="net" class="mt-2 text-3xl font-black">-</p></div><div class="rounded-3xl bg-white p-5 shadow"><p class="text-sm font-bold text-slate-500">Margin</p><p id="margin" class="mt-2 text-3xl font-black">-</p></div></section><section class="mt-5 rounded-3xl bg-white p-5 shadow"><h2 class="text-xl font-black">Revenue vs Profit</h2><canvas id="chart" height="120"></canvas></section><section class="mt-5 rounded-3xl bg-amber-50 p-5 text-sm text-amber-900"><b>Traceability:</b> <span id="trace">-</span></section></main><script>let chart;function r(v){const n=Number(v||0),a=Math.abs(n),s=n<0?'-':'';return s+'Rp'+a.toLocaleString('id-ID')}function p(v){return v==null?'-':(Number(v)*100).toFixed(1).replace('.0','')+'%'}function t(id,v){document.getElementById(id).textContent=v}google.script.run.withSuccessHandler(function(x){const f=x.finance;t('subtitle',x.clinicId+' • '+x.period+' • '+x.generatedAt);t('revenue',r(f.totalRevenue));t('gross',r(f.grossProfit));t('net',r(f.netProfit));t('margin',p(f.profitMargin));t('trace','Data '+f.dataStatus+' • Trace '+f.traceStatus+' — '+(x.caveat||''));chart=new Chart(document.getElementById('chart'),{type:'bar',data:{labels:(x.trend||[]).map(z=>z.period),datasets:[{label:'Revenue',data:(x.trend||[]).map(z=>z.totalRevenue),backgroundColor:'#2563eb'},{label:'Profit',data:(x.trend||[]).map(z=>z.netProfit),backgroundColor:'#059669'}]},options:{plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>r(v)}}}}})}).getDefaultExecutiveDashboardPayload();</script></body></html>
